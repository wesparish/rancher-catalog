{{- $secretName := printf "%s-jvb" (include "call-nested" (list . "prosody" "prosody.fullname")) }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "jitsi-meet.jvb.labels" . | nindent 4 }}
type: Opaque
data:
  JVB_AUTH_USER: '{{ .Values.jvb.xmpp.user | b64enc }}'
  # Reuse the existing secret's value if present, so upgrades/syncs don't silently rotate it
  # (breaks jvb's XMPP auth against prosody). Only generate fresh randomness on first
  # install. Locally patched from upstream jitsi-meet 1.5.1 -- upstream only supports pinning
  # via .Values.jvb.xmpp.password (a plaintext values.yaml commit), not lookup-based reuse.
  # Re-apply this patch if the jitsi-meet dependency is ever updated (helm dep update / helm
  # dep build will overwrite it).
  {{- if $existingSecret }}
  JVB_AUTH_PASSWORD: '{{ index $existingSecret.data "JVB_AUTH_PASSWORD" }}'
  {{- else }}
  JVB_AUTH_PASSWORD: '{{ default (randAlphaNum 10) .Values.jvb.xmpp.password | b64enc }}'
  {{- end }}
