{{- $secretName := printf "%s-jicofo" (include "call-nested" (list . "prosody" "prosody.fullname")) }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "jitsi-meet.jicofo.labels" . | nindent 4 }}
type: Opaque
data:
  JICOFO_AUTH_USER: '{{ b64enc "focus" }}'
  # Reuse the existing secret's values if present, so upgrades/syncs don't silently rotate
  # them (breaks jicofo's XMPP auth against prosody). Only generate fresh randomness on
  # first install. Locally patched from upstream jitsi-meet 1.5.1 -- upstream only supports
  # pinning via .Values.jicofo.xmpp.password/componentSecret (a plaintext values.yaml
  # commit), not lookup-based reuse. Re-apply this patch if the jitsi-meet dependency is
  # ever updated (helm dep update / helm dep build will overwrite it).
  {{- if $existingSecret }}
  JICOFO_AUTH_PASSWORD: '{{ index $existingSecret.data "JICOFO_AUTH_PASSWORD" }}'
  JICOFO_COMPONENT_SECRET: '{{ index $existingSecret.data "JICOFO_COMPONENT_SECRET" }}'
  {{- else }}
  JICOFO_AUTH_PASSWORD: '{{ default (randAlphaNum 10) .Values.jicofo.xmpp.password | b64enc }}'
  JICOFO_COMPONENT_SECRET: '{{ default (randAlphaNum 10) .Values.jicofo.xmpp.componentSecret | b64enc }}'
  {{- end }}
