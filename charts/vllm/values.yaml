# Default values for vllm.
# This is a YAML-formatted file.

image:
  repository: vllm/vllm-openai
  tag: "v0.19.0"
  pullPolicy: IfNotPresent

# PVC mounted at /root/.cache/huggingface in every model pod
pvc:
  existingClaim: ai-models-storage-pvc

# Each model gets its own Deployment and NodePort Service
models:
  - name: Qwen3.5-9B-AWQ
    replicas: 1
    # Subdirectory within the PVC where the model files live
    subPath: Qwen3.5-9B-AWQ
    nodePort: 30800
    nodeSelector:
      nvidia.com/gpu.product: NVIDIA-A30-SHARED
    vllm:
      gpuMemoryUtilization: 0.85
      maxModelLen: 131072
      trustRemoteCode: false
      enforceEager: true
      enableAutoToolChoice: true
      toolCallParser: qwen3_xml
      kvCacheDtype: fp8
      maxNumSeqs: 1
      enableChunkedPrefill: true

  - name: gemma-4-E4B-it
    replicas: 0
    image:
      tag: "gemma4"
    # Subdirectory within the PVC where the model files live
    subPath: gemma-4-E4B-it
    nodePort: 30801
    nodeSelector:
      nvidia.com/gpu.product: NVIDIA-A30-SHARED
    vllm:
      gpuMemoryUtilization: 0.80
      maxModelLen: 65536
      trustRemoteCode: false
      maxNumSeqs: 1
      enableChunkedPrefill: true
      enablePrefixCaching: true
      asyncScheduling: true
      enableAutoToolChoice: true
      toolCallParser: gemma4
      chatTemplate: /model/chat_template.jinja
      # Skip audio encoder; remove to enable audio input
      limitMmPerPrompt: '{"audio": 0}'

  - name: Qwen3-TTS-12Hz-1.7B-CustomVoice
    replicas: 0
    # Uses vllm-omni image for TTS support — needs explicit command since vllm-omni has no ENTRYPOINT
    command: ["vllm", "serve"]
    image:
      repository: vllm/vllm-omni
      tag: "v0.18.0"
    subPath: Qwen3-TTS-12Hz-1.7B-CustomVoice
    nodePort: 30802
    nodeSelector:
      nvidia.com/gpu.product: NVIDIA-A30-SHARED
    vllm:
      omni: true
      stageConfigsPath: /usr/local/lib/python3.12/dist-packages/vllm_omni/model_executor/stage_configs/qwen3_tts.yaml
      trustRemoteCode: true
      enforceEager: true
      maxNumSeqs: 1


serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

resources:
  limits:
    nvidia.com/gpu: 1

nameOverride: ""
fullnameOverride: ""
