{{- range .Values.models }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm.fullname" $ }}-{{ include "vllm.modelName" .name }}
  labels:
    {{- include "vllm.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ include "vllm.modelName" .name }}
spec:
  replicas: {{ if kindIs "invalid" .replicas }}1{{ else }}{{ .replicas }}{{ end }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "vllm.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ include "vllm.modelName" .name }}
  template:
    metadata:
      {{- with $.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vllm.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ include "vllm.modelName" .name }}
        {{- with $.Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      hostIPC: true
      serviceAccountName: {{ include "vllm.serviceAccountName" $ }}
      containers:
        - name: vllm
          image: "{{ (.image).repository | default $.Values.image.repository }}:{{ (.image).tag | default $.Values.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          securityContext:
            privileged: true
          {{- with .command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - /model
            - --served-model-name={{ .name }}
            - --port=8000
            {{- with .vllm }}
            {{- if .omni }}
            - --omni
            {{- end }}
            {{- if .stageConfigsPath }}
            - --stage-configs-path={{ .stageConfigsPath }}
            {{- end }}
            {{- if .gpuMemoryUtilization }}
            - --gpu-memory-utilization={{ .gpuMemoryUtilization }}
            {{- end }}
            {{- if .maxModelLen }}
            - --max-model-len={{ .maxModelLen | toString }}
            {{- end }}
            {{- if .trustRemoteCode }}
            - --trust-remote-code
            {{- end }}
            {{- if .enforceEager }}
            - --enforce-eager
            {{- end }}
            {{- if .enableAutoToolChoice }}
            - --enable-auto-tool-choice
            {{- end }}
            {{- if .toolCallParser }}
            - --tool-call-parser={{ .toolCallParser }}
            {{- end }}
            {{- if .kvCacheDtype }}
            - --kv-cache-dtype={{ .kvCacheDtype }}
            {{- end }}
            {{- if .maxNumSeqs }}
            - --max-num-seqs={{ .maxNumSeqs }}
            {{- end }}
            {{- if .enableChunkedPrefill }}
            - --enable-chunked-prefill
            {{- end }}
            {{- if .asyncScheduling }}
            - --async-scheduling
            {{- end }}
            {{- if .enablePrefixCaching }}
            - --enable-prefix-caching
            {{- end }}
            {{- if .chatTemplate }}
            - --chat-template={{ .chatTemplate }}
            {{- end }}
            {{- if .limitMmPerPrompt }}
            - --limit-mm-per-prompt
            - {{ .limitMmPerPrompt | quote }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
          volumeMounts:
            - name: hf-cache
              mountPath: /model
              subPath: {{ .subPath }}
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: {{ $.Values.pvc.existingClaim }}
      {{- with (default $.Values.nodeSelector .nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
