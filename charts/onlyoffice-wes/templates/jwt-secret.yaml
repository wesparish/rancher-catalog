{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace "jwt-secret" }}
apiVersion: v1
kind: Secret
metadata:
  name: "jwt-secret"
type: Opaque
data:
  # Reuse the existing secret's value if it exists, so upgrades/syncs don't silently rotate
  # the JWT secret (which breaks OnlyOffice's JWT validation and any client integration
  # configured with the old value). Only generate a fresh random value on first install.
  {{- if $existingSecret }}
  jwt-secret: {{ index $existingSecret.data "jwt-secret" | quote }}
  {{- else }}
  jwt-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}

