apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mongodb-official
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-mongodb-official
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ include "rocketchat-wes.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  ports:
    - port: 27017
      targetPort: mongodb
      protocol: TCP
      name: mongodb
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}-mongodb-official
    app.kubernetes.io/instance: {{ .Release.Name }}
