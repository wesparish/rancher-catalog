apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mongodb-official
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-mongodb-official
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ include "rocketchat-wes.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.mongodbOfficial.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}-mongodb-official
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}-mongodb-official
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: mongodb-official
          image: "{{ .Values.mongodbOfficial.image.repository }}:{{ .Values.mongodbOfficial.image.tag }}"
          imagePullPolicy: {{ .Values.mongodbOfficial.image.pullPolicy }}
          args:
            - "--replSet=rs0"
            - "--oplogSize=128"
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: mongodb-official-data
              mountPath: /data/db
      nodeSelector:
        ceph-client: "true"
      volumes:
        - name: mongodb-official-data
          persistentVolumeClaim:
            claimName: {{ .Values.mongodbOfficial.persistence.existingClaim }}
