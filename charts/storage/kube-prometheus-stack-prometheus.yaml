---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kube-prometheus-stack-prometheus-data
spec:
  accessModes:
  - ReadWriteMany
  capacity:
    storage: 50Gi
  csi:
    driver: cephfs.csi.ceph.com
    nodeStageSecretRef:
      # node stage secret name
      name: csi-cephfs-secret
      # node stage secret namespace where above secret is created
      namespace: ceph-csi
    volumeAttributes:
      # optional file system to be mounted
      "fsName": "test1"
      # Required options from storageclass parameters need to be added in volumeAttributes
      "clusterID": "6c2190ab-5525-4345-8dba-8c3151c4e530"
      "staticVolume": "true"
      "rootPath": /k8s-volumes/kube-prometheus-stack-data/prometheus/
    # volumeHandle can be anything, need not to be same
    # as PV name or volume name. keeping same for brevity
    volumeHandle: kube-prometheus-stack-prometheus-data
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
# prometheus-operator will provision it's own PVC
