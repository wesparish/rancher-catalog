# Default values for nginx-ingress-wes.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

ingress-nginx:
  controller:
    ingressClass: nginx-wes
    ingressClassResource:
      name: "nginx-wes"
      default: true
    service:
      type: LoadBalancer
      loadBalancerIP: 172.16.1.223
      annotations:
        metallb.universe.tf/address-pool: default
    kind: DaemonSet
    nodeSelector:
      ingress: "true"
    allowSnippetAnnotations: true
    config:
      # cert-manager v1.12+ creates HTTP-01 solver ingresses with pathType: Exact.
      # nginx-ingress v1.10+ introduced strict-validate-path-type (default true in
      # v1.12) which rejects Exact paths for ACME challenge tokens. Disabling it
      # allows cert-manager to complete HTTP-01 challenges.
      strict-validate-path-type: "false"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    admissionWebhooks:
      certManager:
        enabled: true
        # Use chart's self-signed CA (no issuerRef). Let's Encrypt cannot issue for
        # internal SANs (*.svc); cert-manager will issue and renew from the root-issuer.
        admissionCert:
          duration: "87600h0m0s"  # 10 years
          # issuerRef:  # leave unset so chart creates self-signed Issuer + root-issuer
          #   name: "letsencrypt-production"
          #   kind: "ClusterIssuer"