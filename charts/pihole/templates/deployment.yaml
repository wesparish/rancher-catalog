apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pihole.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "pihole.name" . }}
    helm.sh/chart: {{ include "pihole.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pihole.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "pihole.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: TZ
              value: America/Chicago
            # v6: DNS1/DNS2 dropped intentionally. The existing upstream
            # (172.16.1.230#5053), reverse DNS/conditional forwarding, and
            # admin password are already configured in setupVars.conf on the
            # PVC and will auto-migrate into pihole.toml on first v6 boot.
            # Setting these as FTLCONF_* env vars instead would make them
            # permanently read-only (unchangeable via web UI/API afterward).
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: dnstcp
              containerPort: 53
              protocol: TCP
            - name: dnsudp
              containerPort: 53
              protocol: UDP
          startupProbe:
            httpGet:
              # v6: bare "/" returns 403 by design (DNS-rebinding host-header
              # protection, confirmed against a live v6 pod). /admin/login is
              # the unauthenticated route that reliably returns 200.
              path: /admin/login
              port: http
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /admin/login
              port: http
          readinessProbe:
            httpGet:
              path: /admin/login
              port: http
          volumeMounts:
          - name: pihole-data
            mountPath: /etc/dnsmasq.d/
            subPath: dnsmasq/
          - name: pihole-data
            mountPath: /etc/pihole/
            subPath: etc/pihole/
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      volumes:
      - name: pihole-data
        persistentVolumeClaim:
          claimName: {{ .Values.pihole.persistence.existingClaim }}

