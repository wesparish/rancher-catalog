
ingress:
  enabled: true
  className: "nginx-wes"
  annotations:
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 2000m
    nginx.ingress.kubernetes.io/auth-signin: https://oauth2-proxy-authentik.elastiscale.net/oauth2/start
    nginx.ingress.kubernetes.io/auth-url: https://oauth2-proxy-authentik.elastiscale.net/oauth2/auth
  hosts:
    - host: frigate.elastiscale.net
      paths:
        - path: "/"
          pathType: Prefix
  tls:
    - secretName: frigate-elastiscale.net
      hosts:
        - frigate.elastiscale.net
      certificate:
        enabled: false

frigate:
  nodeSelector:
    ceph-client: "true"

  image:
    repository: ghcr.io/blakeblackshear/frigate
    tag: 0.17.2-tensorrt # nvidia gpu
    pullPolicy: IfNotPresent

  env:
    TZ: "America/Chicago"

  shmSize: 4Gi

  envFromSecrets:
    # kubectl -n frigate create secret generic frigate-env-secrets \
    #   --from-literal=FRIGATE_CAMERA_USER=<user> \
    #   --from-literal=FRIGATE_CAMERA_PASSWORD=<pwd>
    - frigate-env-secrets

  #!!!!!!!!!!
  #! NOTE: This config is documentation only and is NOT applied to the running
  #! deployment -- persistence.config.ephemeralWritableConfigYaml is set to
  #! false below specifically so config.yml on the frigate-config PVC (the
  #! real source of truth) is never overwritten by this block on pod restart.
  #! Keep this in sync manually when the live config changes.
  #!!!!!!!!!!
  config: |
    birdseye:
      enabled: true
      mode: continuous
    mqtt:
      # Required: host name
      host: 172.16.1.229
      # Optional: port (default: shown below)
      port: 1883
      # Optional: topic prefix (default: shown below)
      # WARNING: must be unique if you are running multiple instances
      topic_prefix: frigate
      # Optional: client id (default: shown below)
      # WARNING: must be unique if you are running multiple instances
      client_id: frigate
      # Optional: interval in seconds for publishing stats (default: shown below)
      stats_interval: 60
    auth:
      enabled: false
    proxy:
      # Real secret lives only in config.yml on the PVC, not in git.
      # Generate via: python3 -c 'import secrets; print(secrets.token_hex(64))'
      auth_secret: "<see PVC config.yml>"
      default_role: admin
    detectors:
      onnx:
        type: onnx
    model:
      model_type: yolox
      path: /config/model_cache/yolox_tiny.onnx
      width: 416
      height: 416
      input_tensor: nchw
      input_dtype: float_denorm
      labelmap_path: /labelmap/coco-80.txt
    cameras:
      driveway_flood_light:
        ffmpeg:
          inputs:
            - path: rtsp://admin:{FRIGATE_CAMERA_PASSWORD}@172.16.1.117:8554/Streaming/Channels/101
              roles:
                - detect
        detect:
          width: 1280
          height: 720
          fps: 5
      # Name of your camera
      front_patio:
        ffmpeg:
          inputs:
            - path:
                rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@172.16.1.83:554//h264Preview_01_main
              roles:
                - detect
        detect:
          width: 1280
          height: 720
          fps: 5
      back_patio:
        ffmpeg:
          inputs:
            - path:
                rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@172.16.1.82:554//h264Preview_01_main
              roles:
                - detect
        detect:
          width: 1280
          height: 720
          fps: 5
      driveway:
        ffmpeg:
          inputs:
            - path:
                rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@172.16.1.80:554/cam/realmonitor?channel=1&subtype=0
              roles:
                - detect
        detect:
          width: 2688
          height: 1520
          fps: 5
        objects:
          track:
            - car
            - person
        motion:
          mask:
            1,0,0,0,0,0.403,0.065,0.36,0.181,0.306,0.222,0.292,0.209,0.142,0.3,0.125,0.312,0.269,0.37,0.252,0.45,0.229,0.537,0.224,0.661,0.234,0.817,0.268,0.918,0.301,1,0.351
      hobby_patio:
        ffmpeg:
          inputs:
            - path:
                rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@172.16.1.9:554/h264Preview_01_main
              roles:
                - detect
        detect:
          width: 1280
          height: 720
          fps: 5
        motion:
          mask:
            0.034,0.612,0.168,0.571,0.281,0.547,0.354,0.54,0.441,0.528,0.436,0.001,0,0,0,0.623
    record:
      enabled: true
      continuous:
        days: 0
      motion:
        days: 0
      alerts:
        retain:
          days: 10
          mode: motion
      detections:
        retain:
          days: 10
          mode: all
    snapshots:
      enabled: true
      # Optional: draw bounding box on the snapshots (default: shown below)
      bounding_box: true
      # Optional: crop the snapshot (default: shown below)
      crop: false
      # Optional: Camera override for retention settings (default: global values)
      retain:
        # Required: Default retention days (default: shown below)
        default: 10
  service:
    # -- Type of Service to use
    type: LoadBalancer
    # -- Port the Service should communicate on
    #port: 5000
    ## Specify the nodePort value for the LoadBalancer and NodePort service types.
    ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-nodeport
    ##
    # nodePort:
    ## Provide any additional annotations which may be required. This can be used to
    ## set the LoadBalancer service type to internal only.
    ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#internal-load-balancer
    ##
    annotations: #{}
      metallb.universe.tf/address-pool: default
      metallb.universe.tf/allow-shared-ip: default
    #labels: {}

    # -- Set specific IP address for LoadBalancer. `service.type` must be set to `LoadBalancer`
    loadBalancerIP: 172.16.1.235

    # loadBalancerSourceRanges: []
    ## Set the externalTrafficPolicy in the Service to either Cluster or Local
    externalTrafficPolicy: Local

  persistence:
    media:
      enabled: true
      existingClaim: frigate-data
    config:
      enabled: true
      existingClaim: frigate-config
      # IMPORTANT: subchart defaults this to true, which runs a copyconfig
      # init container on every pod (re)start that overwrites config.yml on
      # the PVC with the (stale) frigate.config block below. The PVC is the
      # actual source of truth for this deployment -- keep this false.
      ephemeralWritableConfigYaml: false
    # Don't think data needs to be persisted?
    # data:
    #   enabled: true
    #   existingClaim: frigate-data

  gpu:
    nvidia:
      enabled: true

  probes:
    startup:
      enabled: true
      failureThreshold: 60
      periodSeconds: 10