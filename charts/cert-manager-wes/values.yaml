# Default values for cert-manager-wes.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: nginx
  tag: stable
  pullPolicy: IfNotPresent

# Subchart (Jetstack cert-manager): values under cert-manager must match its schema.
cert-manager:
  # Let Helm install and upgrade CRDs with the chart (idempotent on upgrade).
  # keep: true so helm uninstall does not delete CRDs (avoids wiping Certificates/Issuers).
  crds:
    enabled: true
    keep: true
  nodeSelector:
    ingress: "true"
  extraArgs:
    - --default-issuer-name=letsencrypt-production
    - --default-issuer-kind=ClusterIssuer
    - --default-issuer-group=cert-manager.io
service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  path: /
  hosts:
    - chart-example.local
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #  cpu: 100m
  #  memory: 128Mi
  # requests:
  #  cpu: 100m
  #  memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
