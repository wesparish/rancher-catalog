# Default values for metallb-wes.
# Wrapper around the official MetalLB chart. Address pools are rendered as
# IPAddressPool + L2Advertisement CRs (post-install/post-upgrade hooks).

# addressPools drives both the IPAddressPool and L2Advertisement resources.
# See https://metallb.universe.tf/configuration/
addressPools:
  - name: default
    protocol: layer2
    addresses:
      - 172.16.1.220-172.16.1.240

# Optional overrides for the official metallb subchart (see chart values).
# CRD management: the chart installs MetalLB CRDs when crds.enabled is true.
metallb:
  crds:
    enabled: true
    # Use Ignore so TLS/cert errors (e.g. webhook cert not ready) don't block IPAddressPool/L2Advertisement creation.
    # Set to Fail for strict validation once the webhook certificate is stable.
    validationFailurePolicy: Ignore
