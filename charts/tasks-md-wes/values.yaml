replicaCount: 1

image:
  repository: baldissaramatheus/tasks.md
  tag: "3.3.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 1000

securityContext: {}
  # runAsNonRoot: true
  # runAsUser: 1000

# Tasks.md environment variables
env:
  # User/group ID that owns files and directories (recommended)
  PUID: "1000"
  PGID: "1000"
  # Name shown below the header and in the browser tab
  TITLE: ""
  # Base path for subpath reverse-proxy (e.g. "/tasks")
  # Note: PWA does not work when BASE_PATH is set to anything other than "/"
  BASE_PATH: ""
  # Interval in minutes to clean up orphaned local images (0 = disabled, default 1440 = 24h)
  LOCAL_IMAGES_CLEANUP_INTERVAL: "1440"

# Extra environment variables passed as a list of {name, value} or {name, valueFrom} objects
extraEnv: []
  # - name: SOME_VAR
  #   value: "some-value"
  # - name: SECRET_VAR
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: my-key

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "nginx-wes"
  annotations:
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/auth-signin: https://oauth2-proxy-authentik.elastiscale.net/oauth2/start
    nginx.ingress.kubernetes.io/auth-url: https://oauth2-proxy-authentik.elastiscale.net/oauth2/auth
  hosts:
    - host: tasks.elastiscale.net
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: tasks.elastiscale.net
      hosts:
        - tasks.elastiscale.net

# Persistence for /tasks volume (markdown task files)
persistence:
  tasks:
    enabled: true
    # Use an existing PVC instead of creating one
    existingClaim: "tasks-data"
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    annotations: {}

  # Persistence for /config volume (stylesheets, images, sort state)
  config:
    enabled: true
    existingClaim: "tasks-config"
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    annotations: {}

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
